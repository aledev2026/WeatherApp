<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <div id="weather-card" class="weather-card">
        <div id="search-box" class="search-box">
            <input type="text" id="input-city" class="input-city" placeholder="Enter city name">
            <button id="search-btn" class="search-btn">Search</button>
            
            <img src="" alt="weather-img" id="weather-img" class="weather-img">
            <h2 id="city-name" class="city-name">Rome</h2>
            <h1 id="temperature" class="temperature">25°C</h1>
            <p id="description" class="description">Sunny</p>
        </div>
    </div>
</body>
</html>
